<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#101a33"/>
      <stop offset="100%" stop-color="#0b1226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="arm1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="arm2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#233252" stroke-width="1" opacity="0.35">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M150 0 V320 M300 0 V320 M450 0 V320 M600 0 V320 M750 0 V320 M900 0 V320 M1050 0 V320"/>
  </g>

  <!-- workspace annulus (right side) -->
  <g transform="translate(950,160)">
    <circle r="130" fill="none" stroke="#334570" stroke-width="1.5" stroke-dasharray="5 6"/>
    <circle r="34" fill="none" stroke="#334570" stroke-width="1.5" stroke-dasharray="5 6"/>
    <circle r="130" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.35"/>

    <!-- reach arc -->
    <path d="M 118 -54 A 130 130 0 0 1 122 44" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <!-- 2-link arm: base -> elbow -> end effector -->
    <circle cx="0" cy="0" r="52" fill="url(#glow)"/>
    <line x1="0" y1="0" x2="62" y2="-58" stroke="url(#arm1)" stroke-width="11" stroke-linecap="round"/>
    <line x1="62" y1="-58" x2="122" y2="-4" stroke="url(#arm2)" stroke-width="9" stroke-linecap="round"/>

    <!-- joints -->
    <circle cx="0" cy="0" r="13" fill="#0b1020" stroke="#38bdf8" stroke-width="3.5"/>
    <circle cx="62" cy="-58" r="10" fill="#0b1020" stroke="#818cf8" stroke-width="3.5"/>
    <circle cx="122" cy="-4" r="8" fill="#f472b6"/>
    <circle cx="122" cy="-4" r="16" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.6"/>
    <circle cx="122" cy="-4" r="24" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.3"/>

    <!-- angle labels -->
    <text x="20" y="24" fill="#7dd3fc" font-size="15" font-style="italic">&#952;&#8321;</text>
    <text x="76" y="-70" fill="#a5b4fc" font-size="15" font-style="italic">&#952;&#8322;</text>
    <text x="132" y="-24" fill="#f9a8d4" font-size="13">(X, Y)</text>
  </g>

  <!-- title block -->
  <g transform="translate(70,0)">
    <rect x="0" y="88" width="6" height="86" rx="3" fill="url(#accent)"/>
    <text x="26" y="122" fill="#f8fafc" font-size="42" font-weight="700" letter-spacing="0.5">IK-ML</text>
    <text x="150" y="122" fill="#94a3b8" font-size="42" font-weight="300">&#183; 2DOF Planar Manipulator</text>
    <text x="26" y="162" fill="#cbd5e1" font-size="19" letter-spacing="0.3">Inverse Kinematics, Learned &#8212; Not Solved</text>

    <text x="26" y="206" fill="#64748b" font-size="14" letter-spacing="0.4">(Target_X, Target_Y)</text>
    <text x="196" y="206" fill="url(#accent)" font-size="16" font-weight="600">&#10230;</text>
    <text x="228" y="206" fill="#64748b" font-size="14" letter-spacing="0.4">Machine Learning</text>
    <text x="360" y="206" fill="url(#accent)" font-size="16" font-weight="600">&#10230;</text>
    <text x="392" y="206" fill="#64748b" font-size="14" font-style="italic" letter-spacing="0.4">(&#952;&#8321;, &#952;&#8322;)</text>

    <!-- chips -->
    <g font-size="12.5" font-weight="600">
      <rect x="26" y="232" width="112" height="28" rx="14" fill="#0e1b34" stroke="#38bdf8" stroke-width="1.2"/>
      <text x="82" y="250" fill="#7dd3fc" text-anchor="middle">5 ML MODELS</text>
      <rect x="150" y="232" width="140" height="28" rx="14" fill="#0e1b34" stroke="#818cf8" stroke-width="1.2"/>
      <text x="220" y="250" fill="#a5b4fc" text-anchor="middle">SINGLE-BRANCH IK</text>
      <rect x="302" y="232" width="132" height="28" rx="14" fill="#0e1b34" stroke="#f472b6" stroke-width="1.2"/>
      <text x="368" y="250" fill="#f9a8d4" text-anchor="middle">FK-VERIFIED</text>
      <rect x="446" y="232" width="150" height="28" rx="14" fill="#0e1b34" stroke="#34d399" stroke-width="1.2"/>
      <text x="521" y="250" fill="#6ee7b7" text-anchor="middle">MANUAL EXECUTION</text>
    </g>
  </g>

  <rect x="0" y="314" width="1200" height="6" rx="3" fill="url(#accent)"/>
</svg>
