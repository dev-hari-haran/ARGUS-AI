<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0d1528"/>
    </linearGradient>
    <linearGradient id="aacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="16" fill="url(#abg)"/>
  <text x="600" y="44" text-anchor="middle" fill="#f8fafc" font-size="21" font-weight="700" letter-spacing="2">MODULAR ARCHITECTURE</text>
  <rect x="490" y="56" width="220" height="3" rx="1.5" fill="url(#aacc)"/>

  <!-- Column: Configuration -->
  <g>
    <rect x="45" y="90" width="250" height="300" rx="14" fill="#0e1b34" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="170" y="120" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="700" letter-spacing="1.5">CONFIGS / YAML</text>
    <line x1="70" y1="132" x2="270" y2="132" stroke="#1e3355" stroke-width="1.5"/>
    <g fill="#94a3b8" font-size="13">
      <text x="70" y="160">robot.yaml &#8212; L1, L2, limits, branch</text>
      <text x="70" y="186">dataset.yaml &#8212; samples, seed</text>
      <text x="70" y="212">features.yaml &#8212; toggles</text>
      <text x="70" y="238">preprocessing.yaml &#8212; scaler</text>
      <text x="70" y="264">split.yaml &#8212; ratios, k-fold</text>
      <text x="70" y="290">models/*.yaml &#8212; per model</text>
      <text x="70" y="316">tuning/*.yaml &#8212; search spaces</text>
      <text x="70" y="342">logging.yaml &#183; evaluation.yaml</text>
    </g>
    <text x="170" y="374" text-anchor="middle" fill="#475569" font-size="11.5" font-style="italic">single source of truth &#8212; zero hardcoding</text>
  </g>

  <!-- Column: Source Modules -->
  <g>
    <rect x="335" y="90" width="530" height="300" rx="14" fill="#101433" stroke="#818cf8" stroke-width="1.5"/>
    <text x="600" y="120" text-anchor="middle" fill="#a5b4fc" font-size="15" font-weight="700" letter-spacing="1.5">SRC / MODULES</text>
    <line x1="360" y1="132" x2="840" y2="132" stroke="#252a55" stroke-width="1.5"/>

    <g font-size="12.5" font-weight="600" text-anchor="middle">
      <rect x="360" y="150" width="150" height="40" rx="9" fill="#0b1020" stroke="#38bdf8" stroke-width="1.2"/>
      <text x="435" y="175" fill="#7dd3fc">kinematics</text>

      <rect x="525" y="150" width="150" height="40" rx="9" fill="#0b1020" stroke="#4f8ff5" stroke-width="1.2"/>
      <text x="600" y="175" fill="#93c5fd">dataset</text>

      <rect x="690" y="150" width="150" height="40" rx="9" fill="#0b1020" stroke="#6366f1" stroke-width="1.2"/>
      <text x="765" y="175" fill="#a5b4fc">features</text>

      <rect x="360" y="205" width="150" height="40" rx="9" fill="#0b1020" stroke="#818cf8" stroke-width="1.2"/>
      <text x="435" y="230" fill="#a5b4fc">preprocessing</text>

      <rect x="525" y="205" width="150" height="40" rx="9" fill="#0b1020" stroke="#a78bfa" stroke-width="1.2"/>
      <text x="600" y="230" fill="#c4b5fd">training &#215; 5</text>

      <rect x="690" y="205" width="150" height="40" rx="9" fill="#0b1020" stroke="#c084fc" stroke-width="1.2"/>
      <text x="765" y="230" fill="#d8b4fe">evaluation</text>

      <rect x="360" y="260" width="150" height="40" rx="9" fill="#0b1020" stroke="#e879f9" stroke-width="1.2"/>
      <text x="435" y="285" fill="#f0abfc">robustness</text>

      <rect x="525" y="260" width="150" height="40" rx="9" fill="#0b1020" stroke="#f472b6" stroke-width="1.2"/>
      <text x="600" y="285" fill="#f9a8d4">tuning</text>

      <rect x="690" y="260" width="150" height="40" rx="9" fill="#0b1020" stroke="#fb7185" stroke-width="1.2"/>
      <text x="765" y="285" fill="#fda4af">inference</text>

      <rect x="360" y="315" width="150" height="40" rx="9" fill="#0b1020" stroke="#34d399" stroke-width="1.2"/>
      <text x="435" y="340" fill="#6ee7b7">visualization</text>

      <rect x="525" y="315" width="150" height="40" rx="9" fill="#0b1020" stroke="#2dd4bf" stroke-width="1.2"/>
      <text x="600" y="340" fill="#5eead4">explainability</text>

      <rect x="690" y="315" width="150" height="40" rx="9" fill="#0b1020" stroke="#94a3b8" stroke-width="1.2"/>
      <text x="765" y="340" fill="#cbd5e1">utils</text>
    </g>
  </g>

  <!-- Column: Outputs -->
  <g>
    <rect x="905" y="90" width="250" height="300" rx="14" fill="#160f2b" stroke="#f472b6" stroke-width="1.5"/>
    <text x="1030" y="120" text-anchor="middle" fill="#f9a8d4" font-size="15" font-weight="700" letter-spacing="1.5">OUTPUTS</text>
    <line x1="930" y1="132" x2="1130" y2="132" stroke="#3b1c44" stroke-width="1.5"/>
    <g fill="#94a3b8" font-size="13">
      <text x="930" y="162">models/ &#8212; artifacts + scalers</text>
      <text x="930" y="192">metrics/ &#8212; CSV &#183; XLSX &#183; JSON</text>
      <text x="930" y="222">plots/ &#8212; PNG &#183; PDF &#183; SVG</text>
      <text x="930" y="252">reports/ &#8212; HTML &#183; PDF &#183; MD</text>
      <text x="930" y="282">logs/ &#8212; per-stage, timestamped</text>
    </g>
    <rect x="930" y="308" width="200" height="58" rx="10" fill="#052e1f" stroke="#34d399" stroke-width="1.3"/>
    <text x="1030" y="332" text-anchor="middle" fill="#6ee7b7" font-size="12.5" font-weight="700">TEST SET TOUCHED</text>
    <text x="1030" y="352" text-anchor="middle" fill="#6ee7b7" font-size="12.5" font-weight="700">EXACTLY ONCE</text>
  </g>

  <!-- flow arrows between columns -->
  <g stroke="#475569" stroke-width="2" fill="none">
    <path d="M295 240 L330 240" marker-end="url(#aarrow)"/>
    <path d="M865 240 L900 240" marker-end="url(#aarrow)"/>
  </g>
  <defs>
    <marker id="aarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
