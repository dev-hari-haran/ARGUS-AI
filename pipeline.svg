<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0e162b"/>
    </linearGradient>
    <linearGradient id="pacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
  </defs>

  <rect width="1200" height="260" rx="16" fill="url(#pbg)"/>
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="21" font-weight="700" letter-spacing="2">END-TO-END PIPELINE</text>
  <rect x="500" y="54" width="200" height="3" rx="1.5" fill="url(#pacc)"/>

  <!-- stage boxes -->
  <g font-size="13.5" font-weight="600" text-anchor="middle">
    <!-- 1 FK Data Gen -->
    <rect x="40" y="95" width="150" height="66" rx="12" fill="#0e1b34" stroke="#38bdf8" stroke-width="1.6"/>
    <text x="115" y="122" fill="#7dd3fc">FK DATA</text>
    <text x="115" y="142" fill="#7dd3fc">GENERATION</text>

    <!-- 2 Features -->
    <rect x="230" y="95" width="150" height="66" rx="12" fill="#0e1b34" stroke="#4f8ff5" stroke-width="1.6"/>
    <text x="305" y="122" fill="#93c5fd">FEATURE</text>
    <text x="305" y="142" fill="#93c5fd">ENGINEERING</text>

    <!-- 3 Preprocess + Split -->
    <rect x="420" y="95" width="150" height="66" rx="12" fill="#0e1b34" stroke="#818cf8" stroke-width="1.6"/>
    <text x="495" y="122" fill="#a5b4fc">SCALE +</text>
    <text x="495" y="142" fill="#a5b4fc">SPLIT 70/15/15</text>

    <!-- 4 Train -->
    <rect x="610" y="95" width="150" height="66" rx="12" fill="#141031" stroke="#a78bfa" stroke-width="1.6"/>
    <text x="685" y="122" fill="#c4b5fd">TRAIN &#215; 5</text>
    <text x="685" y="142" fill="#c4b5fd">+ 5-FOLD CV</text>

    <!-- 5 Evaluate -->
    <rect x="800" y="95" width="150" height="66" rx="12" fill="#1b1030" stroke="#e879f9" stroke-width="1.6"/>
    <text x="875" y="122" fill="#f0abfc">EVALUATE +</text>
    <text x="875" y="142" fill="#f0abfc">ROBUSTNESS</text>

    <!-- 6 Infer -->
    <rect x="990" y="95" width="170" height="66" rx="12" fill="#210f28" stroke="#f472b6" stroke-width="1.6"/>
    <text x="1075" y="122" fill="#f9a8d4">INFERENCE +</text>
    <text x="1075" y="142" fill="#f9a8d4">FK VERIFICATION</text>
  </g>

  <!-- arrows -->
  <g stroke="#818cf8" stroke-width="2.2" marker-end="url(#arrow)">
    <line x1="190" y1="128" x2="224" y2="128"/>
    <line x1="380" y1="128" x2="414" y2="128"/>
    <line x1="570" y1="128" x2="604" y2="128"/>
    <line x1="760" y1="128" x2="794" y2="128"/>
    <line x1="950" y1="128" x2="984" y2="128"/>
  </g>

  <!-- sub captions -->
  <g font-size="11" text-anchor="middle" fill="#64748b">
    <text x="115" y="182">elbow-down branch only</text>
    <text x="305" y="182">r, &#966;, X&#178;, Y&#178;, XY, r&#178;</text>
    <text x="495" y="182">fit scaler on train only</text>
    <text x="685" y="182">DT &#183; RF &#183; ET &#183; HGB &#183; XGB</text>
    <text x="875" y="182">Cartesian error headline</text>
    <text x="1075" y="182">&#952; &#8594; FK &#8594; error check</text>
  </g>

  <!-- manual execution ribbon -->
  <rect x="330" y="208" width="540" height="34" rx="17" fill="#052e1f" stroke="#34d399" stroke-width="1.4"/>
  <text x="600" y="230" text-anchor="middle" fill="#6ee7b7" font-size="13.5" font-weight="700" letter-spacing="1">&#9888; EVERY STAGE EXECUTED MANUALLY &#8212; ONE CMD COMMAND AT A TIME</text>
</svg>
